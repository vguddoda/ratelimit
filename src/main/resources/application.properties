spring.application.name=rate-limiting-bucket4j-spring-boot

# Redis Configuration - Optimized for High Throughput
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# Redis Thread Pool Configuration (for 45k+ TPS)
redis.io.threads=8
redis.computation.threads=8

# Rate Limit Configuration - High Throughput Settings
# For testing: 5 requests per 10 seconds (easily testable)
rate.limit.capacity=5
rate.limit.refill.tokens=5
rate.limit.refill.duration=10s

# Server Configuration - Optimized for High Load
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=50
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# Connection Pool Settings
server.tomcat.connection-timeout=20000
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging - Reduce overhead in production
logging.level.root=WARN
logging.level.com.example.demo=INFO

