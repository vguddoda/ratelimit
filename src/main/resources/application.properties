spring.application.name=rate-limiting-hybrid-local-redis

# Redis Configuration - Optimized for High Throughput
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# Redis Thread Pool Configuration (for 45k+ TPS)
redis.io.threads=8
redis.computation.threads=8

# ===== HYBRID RATE LIMITING CONFIGURATION =====

# Rate Limit Window (seconds)
# How long each rate limit window lasts
rate.limit.window.duration=60

# Default Rate Limit (requests per window)
# 60 requests per 60 seconds = 1 req/sec per tenant
# chunkSize = 10% of 60 = 6 tokens per chunk
# Bucket4j refill = refillGreedy(60, 60s) = 1 token/second continuous
rate.limit.default.limit=60

# Local Cache Chunk Size (percentage of limit)
# Allocate this % of limit to local cache per sync
# Example: 10% of 10k = 1000 requests per chunk
rate.limit.chunk.percent=10

# Sync Threshold (percentage of chunk consumed)
# Sync with Redis when this % of chunk is consumed
# Example: 90% of 1000 = 900 requests
rate.limit.sync.threshold=90

# Degraded Mode (percentage allowed when Redis down)
# Allow this % of normal traffic when Redis is unavailable
# Example: 10% allows limited traffic during outage
rate.limit.degraded.percent=10

# ===== LEGACY BUCKET4J CONFIG (for backward compatibility) =====
rate.limit.capacity=5
rate.limit.refill.tokens=5
rate.limit.refill.duration=10s

# Server Configuration - Optimized for High Load
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=50
server.tomcat.accept-count=100
server.tomcat.max-connections=10000

# Connection Pool Settings
server.tomcat.connection-timeout=20000
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging - Adjust for environment
logging.level.root=WARN
logging.level.com.example.demo=INFO
logging.level.io.lettuce.core=WARN

